<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">
    <title>Objetivo</title>
</head>
<body>
    <header><a href="/home/index.html"><img src="img/esquerda.png" alt="" class="voltar"></a><span>Novo objetivo</span></header>
    <main>
        <section class="valor">
            <span class="vlr">Valor do Objetivo</span><br><br>
            <span class="vlr">R$ 0,00</span><br><br>
        </section>
        <section class="opcoes">
            <form action="">
                <img src="img/moeda.png"><input type="number" name="valor.inicial" class="formStyle" placeholder="Valor inicial" required /><br>
                <img src="img/mic.png"><input type="text" name="nome" class="formStyle" placeholder="Nome" required /><br>
                <img src="img/calendar.png"><input type="date" name="datafinal" class="formStyle" placeholder="Data final do objetivo" required /><br>
                <img src="img/cor.png"><input type="text" name="Cor" class="formStyleCor" placeholder="Cor" required /><img src="img/Ellipse 6.png"><span> </span><img src="img/Ellipse 7.png" alt=""><span> </span><img src="img/Ellipse 8.png" alt=""><span> </span><img src="img/+.png" alt=""><br>
                <img src="img/foto.png"><input type="text" name="Icone" class="formStyleIcone" placeholder="Icone" required /><img src="img/Vector.png" alt=""><span> </span><img src="img/comida.png"><span> </span><img src="img/camiseta.png" alt=""><span> </span><img src="img/+.png" alt=""><br>
                <img src="img/lapis.png"><input type="text" name="Descricao" class="formStyle" placeholder="Descrição" required /><br>
                <a href="#" class="formButton"><img src="img/direita.png" alt="" width="36px" height="36px"></a>
              </form>
        </section>
    </main>
    <footer><span> </span></footer>
</body>
</html>
